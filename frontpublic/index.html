<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tecture - Vue Template</title>
  <!-- favicons Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicons/favicon-16x16.png" />
  <link rel="manifest" href="/assets/images/favicons/site.webmanifest" />
  <meta name="description" content="tecture Vue js Template" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <!-- Pure CSS Marquee (replaces jQuery marquee.min.js) -->
  <link rel="stylesheet" href="/assets/css/marquee.css">

  <!-- WOW.js base CSS: hide .wow elements before Vue renders them -->
  <style>
    .wow {
      visibility: hidden;
    }

    .wow.animated {
      visibility: visible;
    }
  </style>
</head>


<body class="body-bg-color-1">

  <div class="preloader" id="site-preloader">
    <div class="preloader__image"></div>
  </div>

  <script>
    // Close the preloader with pure JS — no jQuery needed
    window.addEventListener('load', function () {
      var el = document.getElementById('site-preloader');
      if (!el) return;
      el.style.transition = 'opacity 0.5s ease';
      setTimeout(function () {
        el.style.opacity = '0';
        setTimeout(function () {
          el.style.display = 'none';
        }, 500);
      }, 200);
    });
  </script>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>


  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/jarallax.min.js"></script>
  <script src="/assets/js/odometer.min.js"></script>
  <script src="/assets/js/wNumb.min.js"></script>
  <script src="/assets/js/gsap/gsap.js"></script>
  <script src="/assets/js/gsap/ScrollTrigger.js"></script>
  <script src="/assets/js/gsap/SplitText.js"></script>

</body>

</html>
